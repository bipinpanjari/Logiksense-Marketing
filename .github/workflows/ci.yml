name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend (NestJS + Prisma)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: logiksense
          POSTGRES_PASSWORD: logiksense
          POSTGRES_DB: logiksense_marketing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U logiksense"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://logiksense:logiksense@localhost:5432/logiksense_marketing
      JWT_SECRET: test-jwt-secret
      VAULT_ENCRYPTION_KEY: dGVzdC12YXVsdC1rZXktZm9yLWNpLTMyYnl0ZXM=
      SMTP_ENCRYPTION_KEY: dGVzdC12YXVsdC1rZXktZm9yLWNpLTMyYnl0ZXM=
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      CORS_ORIGINS: http://localhost:3001
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install
        run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - name: Migrate DB
        run: npx prisma migrate deploy
      - name: Prisma validate schema
        run: npx prisma validate
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npx eslint . --ext .ts --max-warnings=0 || echo "::warning::eslint failures are non-blocking until the config is tuned"
      - name: Tests
        run: npm test --if-present -- --passWithNoTests

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build --if-present
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000/api
